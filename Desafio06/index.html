<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio06</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elemtnos da lista a seguir. passe o mouse sobre os termos para descobrir qual tag devera utilizar em cada caso.</p>
    <ul>
        <li><abbr title="Use a tag <p>">Paragrafo</abbr></li>
        <li><abbr title="Use a tag <hx>, x indo ate o 6">Titulos</abbr></li>
        <li><abbr title="Use a tag <img src='enderco da imagem' alt='o que é a imagem'">Imagens</abbr></li>
        <li><abbr title="Use a tag <abbr>">Abreviacoes</abbr></li>
        <li><abbr title="use as tags <html>,<head> e <body>">Codigo fonte</abbr></li>
        <li><abbr title="Use as tags <ol> e <li>">Listas numeradas</abbr></li>
        <li><abbr title="use as tags <dl>,<dt> e <dd>">Listas com demarcadores</abbr></li>
    </ul>
    
</body>
