<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Countdown</title>

  <style>
    body {
      background: #111;
      color: #0f0;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    #timer {
      font-size: 50px;
      letter-spacing: 5px;
    }
  </style>
</head>

<body>

  <h1>Contagem Regressiva</h1>
  <div id="timer">Carregando...</div>
  <br>
  <br>
  <img src="imagens/olhandopracima.jpg" alt="olhando pra cima">

  <script>
    // Data final (ano, mês-1, dia, hora, minuto, segundo)
    const dataFinal = new Date(2026, 4, 6, 17, 30, 0);

    function atualizarTimer() {
      const agora = new Date();
      const diferenca = dataFinal - agora;

      if (diferenca <= 0) {
        document.getElementById("timer").innerHTML = "ACABOU!";
        return;
      }

      const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
      const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
      const segundos = Math.floor((diferenca / 1000) % 60);

      document.getElementById("timer").innerHTML =
        `${dias}d ${horas}h ${minutos}m ${segundos}s`;
    }

    setInterval(atualizarTimer, 1000);
  </script>

</body>
</html>
